<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <!-- 고급스러운 구비 시그니처 3색 네온 그라데이션 둥근 사각형 -->
  <rect width="48" height="48" rx="12" fill="url(#gubi-grad)"/>
  
  <!-- 명품 G 엠블럼 외곽 서클 및 가로선 -->
  <circle cx="24" cy="24" r="14" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="72 20" transform="rotate(-45 24 24)"/>
  
  <!-- 미니멀 옷걸이(Hanger) 코어 라인아트 -->
  <path d="M24 16c-1.1 0-2 .9-2 2 0 .5.2.9.5 1.2l-6.5 5.3c-.6.5-.3 1.5.5 1.5h16c.8 0 1.1-1 .5-1.5l-6.5-5.3c.3-.3.5-.7.5-1.2 0-1.1-.9-2-2-2z" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <defs>
    <linearGradient id="gubi-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#3a6073"/>
    </linearGradient>
  </defs>
</svg>